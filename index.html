<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triangle Pédagogique Augmenté — MaProfBranchee</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap');

    :root {
      --teal: #0D9488;
      --violet: #7C3AED;
      --blue: #2563EB;
      --corail: #EA580C;
      --rouge: #dc2626;
      --vert: #16a34a;
      --fond: #FAFAF9;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--fond);
      font-family: 'DM Sans', system-ui, sans-serif;
      overflow-x: hidden;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Styles spécifiques pour l'intégration standalone */
    #root {
      min-h-screen;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', 'sans-serif'],
            serif: ['"Instrument Serif"', 'serif'],
          },
          colors: {
            teal: { 600: '#0D9488' },
            violet: { 600: '#7C3AED' },
            blue: { 600: '#2563EB' },
            corail: { 600: '#EA580C' },
            rouge: '#dc2626',
            vert: '#16a34a',
            fond: '#FAFAF9',
          }
        }
      }
    }
  </script>
</head>

  <!-- Babel -->

  <script type="text/babel">

    // ═══════════════════════════════════════════════════════════════
    // DATA — Triangle Pédagogique Augmenté

    const AXES = [

        human_role:

    const SCENARIOS = [

        dead_pole: "eleve",
        ia_role: "Générateur de contenu structuré : séquences, exercices, grilles d'évaluation.",
        human_role: "Validation didactique, adaptation au contexte de classe, choix de progression.",
      },
      {

        emoji: "🎯",

        description: "Pendant une séance, l'enseignant utilise l'IA pour générer instantanément des variantes d'exercices adaptées aux besoins repérés.",
        weights: { "ens-sav": 0.7, "ens-elev": 0.8, "elev-sav": 0.5 },
        dead_pole: null,
        ia_role: "Assistant de différenciation : variantes d'exercices, supports adaptés DYS/allophones.",

      },

        id: "evaluation",
        label: "Évaluer par compétences",

        description: "L'IA génère des évaluations alignées sur le socle commun avec grille A/PA/NA. L'enseignant ajuste et interprète les résultats.",
        weights: { "ens-sav": 0.8, "ens-elev": 0.6, "elev-sav": 0.4 },

      },
      {

        label: "Remédier après évaluation",
        emoji: "🔄",

      },
      {

        label: "Accompagner la lecture",
        emoji: "📖",
        level: "Cycle 2",
        description: "L'IA aide à adapter des textes au niveau de lecture de l'élève, propose des exercices de fluence, génère des questions de compréhension différenciées.",
        weights: { "ens-sav": 0.6, "ens-elev": 0.5, "elev-sav": 0.8 },
        dead_pole: null,
        ia_role: "Adaptation de textes, exercices de fluence, questions de compréhension graduées.",
        human_role: "L'enseignant guide la compréhension fine, repère les stratégies de décodage de l'élève et maintient la motivation par la relation de confiance.",
      },
      {
        id: "inclusion",
        label: "Adapter pour l'inclusion",
        emoji: "♿",
        level: "Tous niveaux",
        description: "L'IA génère des supports adaptés (DYS, TDAH, allophones, HP) à partir d'un même contenu de base. L'enseignant personnalise selon le PPS/PAP.",
        weights: { "ens-sav": 0.7, "ens-elev": 0.7, "elev-sav": 0.6 },
        dead_pole: null,
        ia_role: "Reformulation, mise en page adaptée, traduction, simplification du vocabulaire.",
        human_role: "Connaissance du profil individuel, lien avec les familles et les professionnels, ajustement en situation.",
      },
    ];

    const ETHICS_ZONES = [
      {
        min: 0,
        max: 25,
        color: "#16a34a",
        bgColor: "#DCFCE7",
        label: "IA minimale",
        message: "L'IA comme calculatrice — un outil ponctuel. L'enseignant fait l'essentiel. L'IA intervient sur des tâches isolées (correction orthographique, mise en forme).",
        iaStrokeWidth: 1,
        iaDashArray: "6 4",
      },
      {
        min: 25,
        max: 60,
        color: "#0d9488",
        bgColor: "#CCFBF1",
        label: "IA partenaire",
        badge: "RECOMMANDÉ",
        message: "L'assistant invisible — l'IA assiste sur la préparation et la différenciation. L'enseignant reste le pilote. C'est la zone d'équilibre : l'IA amplifie sans remplacer.",
        iaStrokeWidth: 2.5,
        iaDashArray: "none",
      },
      {
        min: 60,
        max: 85,
        color: "#ea580c",
        bgColor: "#FFF7ED",
        label: "IA dominante",
        badge: "ATTENTION",
        message: "L'IA génère la majorité des contenus et évaluations. Risque : la boucle de surcompensation s'enclenche. L'enseignant perd progressivement la main sur ses choix pédagogiques.",
        iaStrokeWidth: 4.5,
        iaDashArray: "none",
      },
      {
        min: 85,
        max: 100,
        color: "#dc2626",
        bgColor: "#FEE2E2",
        label: "IA totale",
        badge: "ZONE ROUGE",
        message: "Enseigner en se trahissant. L'IA fait tout. L'enseignant n'a plus de rôle pédagogique. Le triangle s'effondre : la relation humaine disparaît, l'apprentissage devient mécanique.",
        iaStrokeWidth: 8,
        iaDashArray: "none",
      },
    ];

    const OVERCOMPENSATION_LOOP = {
      title: "⚠️ La boucle de surcompensation",
      steps: [
        "L'IA fait de plus en plus de tâches à la place de l'enseignant",
        "L'enseignant ressent un sentiment d'illégitimité (« l'IA fait mieux que moi »)",
        "Il surcompense en travaillant plus pour « justifier » sa valeur",
        "Épuisement professionnel et perte de repères pédagogiques",
        "Dépendance accrue à l'IA pour compenser la fatigue",
        "Retour à l'étape 1 — la boucle se referme",
      ],
      conclusion: "La solution : rester dans la zone « IA partenaire » (25-60 %). L'IA amplifie, elle ne remplace pas.",
    };

    const REFERENCES = [
      { author: "Houssaye, J.", year: 1988, title: "Le Triangle pédagogique", detail: "Modèle fondateur des relations Enseignant-Élève-Savoir" },
      { author: "Dehaene, S.", year: 2018, title: "Apprendre ! Les talents du cerveau, le défi des machines", detail: "4 piliers de l'apprentissage : attention, engagement actif, retour sur erreur, consolidation" },
      { author: "MEN", year: 2025, title: "Cadre d'usage de l'IA en éducation", detail: "IA générative réservée enseignants, élèves à partir du CM1 uniquement" },
      { author: "UNESCO", year: 2024, title: "Compétences IA pour les enseignants", detail: "15 compétences en 5 dimensions : éthique, pédagogie, données, culture numérique, développement pro" },
      { author: "Hattie, J.", year: 2009, title: "Visible Learning", detail: "Méta-analyse : le feedback a l'une des plus grandes tailles d'effet sur l'apprentissage" },
      { author: "Anderson, L.W. & Krathwohl, D.R.", year: 2001, title: "Taxonomie de Bloom révisée", detail: "6 niveaux cognitifs : mémoriser, comprendre, appliquer, analyser, évaluer, créer" },
    ];

    // Helper functions
    function getEthicsZone(val) {
      return ETHICS_ZONES.find((z) => val >= z.min && val < z.max) || ETHICS_ZONES[3];
    }
    function getVertexById(id) {
      return VERTICES.find((v) => v.id === id);
    }

    // ═══════════════════════════════════════════════════════════════
    // UI COMPONENTS
    // ═══════════════════════════════════════════════════════════════

    function OnboardingOverlay({ onDismiss }) {
      return (
        <div
          onClick={onDismiss}
          className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center cursor-pointer animate-[fadeIn_0.4s]"
        >
          <div
            onClick={(e) => e.stopPropagation()}
            className="bg-white rounded-[20px] p-8 md:p-10 max-w-[440px] mx-5 shadow-[0_25px_60px_rgba(0,0,0,0.25)] text-center animate-[slideUp_0.5s]"
          >
            <div className="text-[48px] mb-3">🔺</div>
            <h2 className="font-serif italic text-[26px] text-slate-900 mb-3 font-normal">Bienvenue dans le Triangle</h2>
            <p className="font-sans text-[15px] text-slate-500 leading-relaxed mb-6">
              Explorez comment l'IA module les 3 relations pédagogiques fondamentales — et où l'humain reste irremplaçable.
            </p>
            <div className="flex flex-col gap-3 mb-8 text-left">
              {[
                { icon: "👆", text: "Cliquez sur un axe ou un sommet du triangle" },
                { icon: "📋", text: "Choisissez un scénario pour voir l'IA en situation" },
                { icon: "⚡", text: "Déplacez le curseur éthique pour tester les limites" },
              ].map((item, i) => (
                <div key={i} className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl text-[14px] text-slate-700">
                  <span className="text-[20px] shrink-0">{item.icon}</span>
                  <span>{item.text}</span>
                </div>
              ))}
            </div>
            <button
              onClick={onDismiss}
              className="bg-teal-600 hover:bg-teal-700 text-white py-3 px-8 rounded-xl font-bold transition-all"
            >
              Explorer le triangle →
            </button>
          </div>
        </div>
      );
    }

    function TriangleSVG({ ethicsValue, activeAxis, activeVertex, scenarioWeights, onAxisClick, onVertexClick }) {
      const zone = getEthicsZone(ethicsValue);
      const iaOpacity = 0.15 + (ethicsValue / 100) * 0.7;
      const vertexOpacity = ethicsValue > 85 ? 0.4 : 1;

      const midpoints = AXES.map((axis) => {
        const from = getVertexById(axis.from);
        const to = getVertexById(axis.to);
        return {
          id: axis.id,
          x: (from.position.x + to.position.x) / 2,
          y: (from.position.y + to.position.y) / 2,
        };
      });

      return (
        <svg
          viewBox="0 0 700 510"
          className="w-full max-w-[600px] mx-auto block overflow-visible"
          role="img"
          aria-label="Triangle Pédagogique Augmenté"
        >
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="4" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
            <radialGradient id="iaGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="#7C3AED" stopOpacity={iaOpacity} />
              <stop offset="100%" stopColor="#7C3AED" stopOpacity="0" />
            </radialGradient>
          </defs>

          {/* IA central glow */}
          <circle cx="350" cy="310" r={70 + ethicsValue * 0.8} fill="url(#iaGrad)">
            <animate attributeName="r" values={`${70 + ethicsValue * 0.8};${76 + ethicsValue * 0.8};${70 + ethicsValue * 0.8}`} dur="3s" repeatCount="indefinite" />
          </circle>

          {/* Axes */}
          {AXES.map((axis) => {
            const from = getVertexById(axis.from);
            const to = getVertexById(axis.to);
            const weight = scenarioWeights ? scenarioWeights[axis.id] || 0.5 : 0.5;
            const isActive = activeAxis === axis.id;
            const mp = midpoints.find(m => m.id === axis.id);
            return (
              <g key={axis.id}>
                {/* Hitbox */}
                <line x1={from.position.x} y1={from.position.y} x2={to.position.x} y2={to.position.y} stroke="transparent" strokeWidth={30} className="cursor-pointer" onClick={() => onAxisClick(axis.id)} />
                {/* Visible line */}
                <line
                  x1={from.position.x} y1={from.position.y} x2={to.position.x} y2={to.position.y}
                  stroke={isActive ? "#7C3AED" : "#94a3b8"}
                  strokeWidth={isActive ? 3.5 : 1.5 + weight * 3}
                  strokeDasharray={zone.iaDashArray !== "none" ? zone.iaDashArray : "none"}
                  opacity={isActive ? 1 : 0.5 + weight * 0.5}
                  className="transition-all duration-300"
                  style={{ filter: isActive ? "url(#glow)" : "none", pointerEvents: "none" }}
                />
                {/* IA link from center */}
                <line
                  x1="350" y1="310" x2={mp.x} y2={mp.y}
                  stroke="#7C3AED"
                  strokeWidth={zone.iaStrokeWidth}
                  strokeDasharray={zone.iaDashArray}
                  opacity={0.3 + (ethicsValue / 100) * 0.5}
                  className="transition-all duration-300"
                  style={{ pointerEvents: "none" }}
                />
              </g>
            );
          })}

          {/* Labels Axes */}
          {AXES.map((axis, i) => {
            const mp = midpoints[i];
            const offsets = [{ dx: 0, dy: -25 }, { dx: -90, dy: 10 }, { dx: 90, dy: 10 }];
            return (
              <text
                key={axis.id + "-label"} x={mp.x + offsets[i].dx} y={mp.y + offsets[i].dy} textAnchor="middle"
                className={`font-sans text-[12px] transition-all duration-300 pointer-events-none ${activeAxis === axis.id ? 'fill-violet-600 font-bold' : 'fill-slate-500'}`}
              >
                {axis.label}
              </text>
            );
          })}

          {/* IA center */}
          <g className="transition-all duration-300">
            <circle cx="350" cy="310" r={30 + ethicsValue * 0.15} fill="#7C3AED" opacity={0.12 + (ethicsValue / 100) * 0.2} />
            <text x="350" y="305" textAnchor="middle" className="font-sans text-[13px] font-bold fill-violet-600">IA</text>
            <text x="350" y="322" textAnchor="middle" className="font-sans text-[10px] fill-violet-600 opacity-70">{ethicsValue}%</text>
          </g>

          {/* Vertices */}
          {VERTICES.map((v) => {
            const isActive = activeVertex === v.id;
            return (
              <g key={v.id} onClick={() => onVertexClick(v.id)} className="cursor-pointer transition-all duration-300" style={{ opacity: vertexOpacity }}>
                <circle cx={v.position.x} cy={v.position.y} r={isActive ? 38 : 34} fill="#fff" stroke={v.color} strokeWidth={isActive ? 3 : 2} style={{ filter: isActive ? "url(#glow)" : "none" }} />
                <text x={v.position.x} y={v.position.y - 4} textAnchor="middle" className="text-[24px] pointer-events-none">{v.emoji}</text>
                <text x={v.position.x} y={v.position.y + 58} textAnchor="middle" className="font-sans text-[13px] font-bold" style={{ fill: v.color }}>{v.label}</text>
              </g>
            );
          })}
        </svg>
      );
    }

    function DetailPanel({ type, data, onClose }) {
      if (!data) return null;
      return (
        <div className="fixed top-0 right-0 w-[min(480px,92vw)] h-screen bg-white shadow-[-8px_0_40px_rgba(0,0,0,0.12)] z-[60] overflow-y-auto animate-[slideIn_0.3s]">
          <button
            onClick={onClose}
            className="sticky top-4 float-right mr-4 w-10 h-10 rounded-xl border border-slate-200 bg-white flex items-center justify-center shadow-sm hover:bg-slate-50 transition-all z-[61]"
          >
            ✕
          </button>
          <div className="p-8 md:p-10">
            {type === "vertex" ? (
              <>
                <div className="text-[48px] mb-3">{data.emoji}</div>
                <h2 className="font-serif italic text-[32px] text-slate-900 mb-4 font-normal" style={{ color: data.color }}>{data.label}</h2>
                <p className="text-[16px] leading-relaxed text-slate-700 mb-6">{data.description}</p>
                <blockquote className="border-l-4 pl-4 italic text-slate-500 text-[15px]" style={{ borderColor: data.color }}>
                  « {data.citation} »
                </blockquote>
              </>
            ) : (
              <>
                <h2 className="font-serif italic text-[28px] text-slate-900 mb-1 font-normal">{data.label}</h2>
                <p className="text-[13px] text-slate-400 mb-8 uppercase font-bold tracking-widest">Relation {getVertexById(data.from).label} ↔ {getVertexById(data.to).label}</p>
                
                <div className="flex flex-col gap-8">
                   <div className="bg-violet-50 p-6 rounded-[20px] border-l-4 border-violet-600">
                      <h3 className="font-bold text-violet-900 mb-4 flex items-center gap-2">🤖 Ce que l'IA peut faire</h3>
                      <ul className="space-y-3">
                        {data.ia_can_do.map((item, i) => (
                          <li key={i} className="text-[14px] text-violet-800 leading-tight">• {item}</li>
                        ))}
                      </ul>
                   </div>
                   <div className="bg-emerald-50 p-6 rounded-[20px] border-l-4 border-emerald-600">
                      <h3 className="font-bold text-emerald-900 mb-4 flex items-center gap-2">👤 Irremplaçable humain</h3>
                      <ul className="space-y-3">
                        {data.human_only.map((item, i) => (
                          <li key={i} className="text-[14px] text-emerald-800 leading-tight">• {item}</li>
                        ))}
                      </ul>
                   </div>
                   <div className="bg-slate-50 p-6 rounded-[20px] border border-slate-200">
                      <h4 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-3">Exemple de terrain</h4>
                      <p className="text-[14px] text-slate-600 italic">« {data.terrain_example} »</p>
                   </div>
                </div>
              </>
            )}
            <button
              onClick={onClose}
              className="w-full mt-10 py-4 bg-slate-900 text-white rounded-xl font-bold hover:bg-black transition-all"
            >
              Fermer l'analyse
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState("explorer");
      const [ethicsValue, setEthicsValue] = useState(35);
      const [activeScenario, setActiveScenario] = useState(null);
      const [openPanel, setOpenPanel] = useState(null); // { type, data }
      const [showOnboarding, setShowOnboarding] = useState(true);
      const [showSources, setShowSources] = useState(false);

      const zone = getEthicsZone(ethicsValue);
      const isRedZone = ethicsValue >= 85;

      const handleAxisClick = (id) => {
        const axis = AXES.find(a => a.id === id);
        setOpenPanel({ type: 'axis', data: axis });
      };

      const handleVertexClick = (id) => {
        const vertex = VERTICES.find(v => v.id === id);
        setOpenPanel({ type: 'vertex', data: vertex });
      };

      return (
        <div className="min-h-screen bg-fond flex flex-col relative overflow-hidden">
          {showOnboarding && <OnboardingOverlay onDismiss={() => setShowOnboarding(false)} />}
          
          {/* Header */}
          <header className="bg-white border-b border-slate-100 py-6 px-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <div className="flex items-center gap-4">
              <div className="w-12 h-12 bg-slate-900 text-white flex items-center justify-center rounded-2xl text-[20px]">🔺</div>
              <div>
                <h1 className="font-serif italic text-[24px] lg:text-[28px] text-slate-900 leading-tight font-normal">Triangle Pédagogique <span className="text-teal-600">Augmenté</span></h1>
                <p className="text-[9px] uppercase font-black text-slate-400 tracking-[0.3em]">Enseigner sans se trahir — v2.0</p>
              </div>
            </div>
            
            <nav className="flex items-center bg-slate-50 p-1 rounded-2xl border border-slate-200">
               {[
                 { id: 'explorer', label: 'Explorer', icon: '🔍' },
                 { id: 'situations', label: 'Situations', icon: '📋' },
                 { id: 'ethique', label: 'Éthique', icon: '⚡' }
               ].map(tab => (
                 <button
                   key={tab.id}
                   onClick={() => { setActiveTab(tab.id); setActiveScenario(null); }}
                   className={`px-6 py-2 rounded-xl text-[13px] font-bold transition-all flex items-center gap-2 ${activeTab === tab.id ? 'bg-white shadow-sm text-slate-900 border border-slate-200' : 'text-slate-500 hover:text-slate-800'}`}
                 >
                   <span>{tab.icon}</span>
                   <span>{tab.label}</span>
                 </button>
               ))}
            </nav>
          </header>

          <main className="flex-1 flex flex-col lg:flex-row max-w-[1440px] mx-auto w-full">
            
            {/* Colonne Triangle */}
            <section className="flex-[1.2] p-8 md:p-16 flex flex-col items-center justify-center relative min-h-[500px]">
               <TriangleSVG
                 ethicsValue={activeTab === 'ethique' ? ethicsValue : 35}
                 activeAxis={openPanel?.type === 'axis' ? openPanel.data.id : null}
                 activeVertex={openPanel?.type === 'vertex' ? openPanel.data.id : null}
                 scenarioWeights={activeTab === 'situations' && activeScenario ? activeScenario.weights : null}
                 onAxisClick={handleAxisClick}
                 onVertexClick={handleVertexClick}
               />
               
               {/* Label Contextuel Mobile / Desktop */}
               <div className="mt-8 bg-white border border-slate-100 shadow-sm px-6 py-3 rounded-2xl flex items-center gap-3 animate-[slideUp_0.8s]">
                  <span className="w-2 h-2 rounded-full bg-teal-600 animate-pulse"></span>
                  <p className="text-[12px] font-bold text-slate-500 uppercase tracking-widest">
                    {activeTab === 'explorer' && "Cliquez sur un axe ou un pôle"}
                    {activeTab === 'situations' && activeScenario ? activeScenario.label : (activeTab === 'situations' ? "Sélectionnez un scénario à droite" : "")}
                    {activeTab === 'ethique' && "Déplacez le curseur ci-dessous"}
                  </p>
               </div>
            </section>

            {/* Colonne Contrôles */}
            <section className="flex-1 p-8 md:p-16 bg-white lg:border-l border-slate-50">
              
              {activeTab === 'explorer' && (
                <div className="h-full flex flex-col justify-center">
                  <h2 className="font-serif italic text-[36px] text-slate-900 mb-6 font-normal leading-tight">Explorez la mutation pédagogique</h2>
                  <p className="text-[16px] text-slate-600 leading-relaxed mb-10">L'IA n'est pas un sommet supplémentaire du triangle scolaire de Jean Houssaye, mais un catalyseur qui transforme chaque relation.</p>
                  <div className="grid grid-cols-1 gap-4">
                     {[
                       { pole: "Enseignant", key: "Gouvernance", color: "#0D9488" },
                       { pole: "Élève", key: "Engagement", color: "#2563EB" },
                       { pole: "Savoir", key: "Légitimité", color: "#EA580C" }
                     ].map(item => (
                       <div key={item.pole} className="p-5 border border-slate-100 rounded-[20px] flex justify-between items-center group hover:bg-slate-50 transition-all cursor-pointer" onClick={() => handleVertexClick(item.pole.toLowerCase())}>
                          <div className="flex items-center gap-4">
                             <div className="w-1.5 h-6 rounded-full" style={{ background: item.color }}></div>
                             <span className="font-bold text-slate-900">{item.pole}</span>
                          </div>
                          <span className="text-[11px] font-black text-slate-400 uppercase tracking-widest">{item.key}</span>
                       </div>
                     ))}
                  </div>
                </div>
              )}

              {activeTab === 'situations' && (
                <div className="space-y-8">
                  <h2 className="font-serif italic text-[32px] text-slate-900 font-normal">Scénarios Terrain</h2>
                  <div className="grid grid-cols-1 gap-3">
                    {SCENARIOS.map(s => (
                      <button
                        key={s.id}
                        onClick={() => setActiveScenario(s)}
                        className={`p-5 rounded-[20px] border text-left transition-all ${activeScenario?.id === s.id ? 'border-teal-600 bg-teal-50 shadow-sm' : 'border-slate-100 hover:border-slate-300'}`}
                      >
                         <div className="flex justify-between items-start mb-2">
                           <span className="text-[20px]">{s.emoji}</span>
                           <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{s.level}</span>
                         </div>
                         <h3 className="font-bold text-slate-900 mb-1">{s.label}</h3>
                         <p className="text-[13px] text-slate-500 leading-snug line-clamp-2">{s.description}</p>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {activeTab === 'ethique' && (
                <div className="space-y-10">
                   <div>
                      <h2 className="font-serif italic text-[32px] text-slate-900 mb-2 font-normal">Niveau d'IA</h2>
                      <p className="text-[14px] text-slate-500 mb-8">Où placez-vous le curseur entre l'outil ponctuel et le remplacement total ?</p>
                      
                      {/* Slider */}
                      <div className="relative pt-10 pb-6 px-2">
                         <input
                           type="range" min="0" max="100" value={ethicsValue}
                           onChange={(e) => setEthicsValue(parseInt(e.target.value))}
                           className="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-violet-600"
                         />
                         <div className="absolute top-0 left-0 w-full flex justify-between pointer-events-none">
                            <span className="text-[15px] animate-bounce">👈 <small className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Bougez</small> 👉</span>
                            <span className="text-[24px] font-serif italic text-violet-600">{ethicsValue}%</span>
                         </div>
                      </div>
                   </div>

                   {/* Zone Info Card */}
                   <div className="p-8 rounded-[32px] border transition-all duration-500" style={{ background: zone.bgColor, borderColor: zone.color + '44' }}>
                      <div className="flex justify-between items-center mb-4">
                         <h3 className="font-black text-slate-900 uppercase tracking-[0.2em] text-[12px]">{zone.label}</h3>
                         {zone.badge && <span className="px-3 py-1 bg-white border border-slate-200 rounded-full text-[9px] font-black">{zone.badge}</span>}
                      </div>
                      <p className="text-[15px] leading-relaxed text-slate-800">{zone.message}</p>
                   </div>

                   {ethicsValue > 60 && (
                      <div className="p-8 rounded-[32px] bg-white border-2 border-orange-200 border-dashed animate-[fadeIn_0.5s]">
                         <h4 className="font-bold text-orange-700 mb-4 flex items-center gap-2">
                           <span>⚠️</span> {OVERCOMPENSATION_LOOP.title}
                         </h4>
                         <ul className="space-y-3">
                            {OVERCOMPENSATION_LOOP.steps.slice(0, 4).map((step, i) => (
                              <li key={i} className="text-[13px] text-slate-600 flex gap-3">
                                <span className="w-5 h-5 bg-orange-100 text-orange-600 flex items-center justify-center rounded-lg font-bold shrink-0">{i+1}</span>
                                <span>{step}</span>
                              </li>
                            ))}
                         </ul>
                         <p className="mt-6 text-[11px] font-bold text-orange-950 opacity-60 text-center uppercase tracking-widest">{OVERCOMPENSATION_LOOP.conclusion}</p>
                      </div>
                   )}
                </div>
              )}
            </section>
          </main>

          <footer className="mt-auto px-10 py-10 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-6">
             <div className="text-[13px] text-slate-400 leading-relaxed text-center md:text-left">
                Cadre théorique : Triangle de Houssaye (1988) augmenté par <strong className="text-slate-900">V. Le Scolan (2025)</strong><br/>
                Modélisation des mutations numériques et IA en éducation.
             </div>
             <div className="flex items-center gap-8">
                <button onClick={() => setShowSources(true)} className="text-[12px] font-bold text-slate-900 hover:text-teal-600 underline underline-offset-4">Sources Scientifiques</button>
                <a href="https://maprofbranchee.fr" target="_blank" className="text-[12px] font-bold text-slate-900 hover:text-teal-600">&copy; MaProfBranchee</a>
             </div>
          </footer>

          {openPanel && <DetailPanel type={openPanel.type} data={openPanel.data} onClose={() => setOpenPanel(null)} />}

          {/* Sources Modal */}
          {showSources && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-5" onClick={() => setShowSources(false)}>
               <div className="bg-white rounded-[32px] max-w-2xl w-full max-h-[85vh] overflow-y-auto p-10 shadow-2xl animate-[slideUp_0.4s]" onClick={e => e.stopPropagation()}>
                  <div className="flex justify-between items-center mb-8">
                    <h2 className="font-serif italic text-[32px] text-slate-900 font-normal">Références Académiques</h2>
                    <button onClick={() => setShowSources(false)} className="text-slate-400 hover:text-slate-900">✕</button>
                  </div>
                  <div className="space-y-6">
                    {REFERENCES.map((ref, i) => (
                      <div key={i} className="p-5 border border-slate-100 rounded-2xl hover:bg-slate-50 transition-all">
                        <div className="flex justify-between items-center mb-2">
                           <span className="font-bold text-slate-900 text-[15px]">{ref.author} ({ref.year})</span>
                        </div>
                        <p className="italic text-slate-600 mb-1 text-[14px]">« {ref.title} »</p>
                        <p className="text-[12px] text-slate-400 uppercase font-black tracking-widest">{ref.detail}</p>
                      </div>
                    ))}
                  </div>
               </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
