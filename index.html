<!DOCTYPE html>
<html lang="fr" class="bg-[#FAFAF9] text-slate-900 antialiased">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triangle Pédagogique Augmenté — Cockpit V2 Premium</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap');

    :root {
      --neon-teal: #0D9488;
      --neon-violet: #7C3AED;
    }

    body { font-family: 'DM Sans', sans-serif; }
    .font-serif { font-family: 'Instrument Serif', serif; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    .animate-fade { animation: fadeIn 0.6s ease-out forwards; }
    .animate-slide { animation: slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-float { animation: float 5s ease-in-out infinite; }

    /* Glassmorphism */
    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    
    .shadow-hologram {
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05), 0 0 25px rgba(13, 148, 136, 0.04);
    }

    /* Range Slider */
    input[type="range"] { appearance: none; background: #E2E8F0; height: 6px; border-radius: 3px; }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none; width: 22px; height: 22px; background: white; border: 3px solid #7C3AED; border-radius: 50%; cursor: pointer;
      box-shadow: 0 4px 10px rgba(124, 58, 237, 0.3); transition: all 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); box-shadow: 0 6px 15px rgba(124, 58, 237, 0.4); }

    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: { 50: '#F0FDFA', 600: '#0D9488', 700: '#0F766E' },
            violet: { 50: '#F5F3FF', 600: '#7C3AED' }
          }
        }
      }
    }
  </script>
</head>
<body class="selection:bg-teal-100 selection:text-teal-900 overflow-x-hidden">
  <div id="root"></div>

  <!-- Intégration directe des données de data.js pour garantir le Single-File WordPress -->
  <script>
    // --- ICONES ---
    const ICON_ENSEIGNANT = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M9 21h6"/><path d="M12 3a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/><path d="M5.5 13a4.5 4.5 0 0 1-1.5 8"/><path d="M18.5 13a4.5 4.5 0 0 0 1.5 8"/></svg>`;
    const ICON_ELEVE = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;
    const ICON_SAVOIR = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>`;

    function buildVertices(overrides) {
      const base = [
        { id: "enseignant", label: "Enseignant", icon: ICON_ENSEIGNANT, emoji: "👩‍🏫", color: "#0D9488", position: { x: 350, y: 70 } },
        { id: "eleve", label: "Élève", icon: ICON_ELEVE, emoji: "👧", color: "#2563EB", position: { x: 120, y: 440 } },
        { id: "savoir", label: "Savoir", icon: ICON_SAVOIR, emoji: "📚", color: "#EA580C", position: { x: 580, y: 440 } }
      ];
      return base.map(v => ({ ...v, ...overrides[v.id] }));
    }

    function buildAxes(overrides) {
      const base = [
        { id: "ens-sav", from: "enseignant", to: "savoir", label: "La préparation", color: "#7C3AED" },
        { id: "ens-elev", from: "enseignant", to: "eleve", label: "La relation", color: "#7C3AED" },
        { id: "elev-sav", from: "eleve", to: "savoir", label: "L'apprentissage", color: "#7C3AED" }
      ];
      return base.map(a => ({ ...a, ...overrides[a.id] }));
    }

    window.LEVELS = [
      { id: "primaire", label: "Primaire (Cycles 1-3)", shortLabel: "Primaire", icon: "🏫", regulation: "IA générative réservée aux enseignants uniquement. Pas de manipulation directe par les élèves. Sensibilisation aux bases de l'IA autorisée." },
      { id: "college-inf", label: "Collège 6e-5e", shortLabel: "6e-5e", icon: "📘", regulation: "IA générative interdite aux élèves avant la 4e. L'enseignant utilise l'IA pour préparer et différencier." },
      { id: "college-sup", label: "Collège 4e-3e", shortLabel: "4e-3e", icon: "📗", regulation: "IA générative autorisée pour les élèves à partir de la 4e, strictement encadrée par l'enseignant." },
      { id: "lycee-sup", label: "Lycée & Supérieur", shortLabel: "Lycée+", icon: "🎓", regulation: "Usage autonome de l'IA par les élèves dans un cadre défini par l'enseignant. Développement de l'esprit critique." }
    ];

    window.DATA_BY_LEVEL = {
      "primaire": {
        vertices: buildVertices({ enseignant: { description: "Le maître polyvalent. Il enseigne toutes les matières et accompagne les premiers apprentissages fondamentaux.", citation: "À 6 ans, l'enfant a besoin d'un regard, pas d'un écran." }, eleve: { description: "Le jeune apprenant. Il découvre le monde par le jeu. Il ne manipule pas d'IA générative.", citation: "On n'apprend pas à lire en demandant à une machine." }, savoir: { description: "Les fondamentaux : lire, écrire, compter. L'IA les sert, pas l'inverse.", citation: "Les fondamentaux ne se négocient pas." } }),
        axes: buildAxes({ "ens-sav": { ia_can_do: ["Générer des séquences cycles 2-3", "Différencier en 3 niveaux", "Structurer des programmations"], human_only: ["Juger la pertinence didactique", "Valider la conformité officielle"], terrain_example: "En CE2, j'utilise l'IA pour mes 3 niveaux de différenciation." }, "ens-elev": { ia_can_do: ["Rapports de suivi par compétence", "Fiches de communication parents"], human_only: ["Le regard bienveillant et la présence", "L'intuition face à la détresse"], terrain_example: "Un enfant qui pleure n'a pas besoin d'un algorithme." }, "elev-sav": { ia_can_do: ["Planifier des révisions espacées", "Générer des quiz adaptés"], human_only: ["L'apprentissage par manipulation", "L'erreur comme levier humain"], terrain_example: "En CP, on apprend en chantant des syllabes." } }),
        scenarios: [ { id: "eval-ce2", title: "Évaluation CE2 Maths", axes_activation: { "ens-sav": 0.9, "ens-elev": 0.3, "elev-sav": 0.5 }, ia_role: "Générateur d'exercices", human_role: "Validation pédagogique" }, { id: "diff-allophone", title: "Élève allophone", axes_activation: { "ens-sav": 0.7, "ens-elev": 0.9, "elev-sav": 0.6 }, ia_role: "Traduction & visuels", human_role: "Intégration émotionnelle" } ]
      },
      "college-inf": {
        vertices: buildVertices({ enseignant: { description: "Professeur disciplinaire. Il accompagne vers l'autonomie.", citation: "L'IA aide l'enseignant, pas l'élève." }, eleve: { description: "Apprenant en transition. Découvre l'autonomie.", citation: "Avant l'IA, maîtriser le raisonnement." }, savoir: { description: "Socle commun de connaissances.", citation: "L'IA outille, l'enseignant relie." } }),
        axes: buildAxes({ "ens-sav": { ia_can_do: ["Supports cycle 3/4", "Évaluations diagnostiques"], human_only: ["Hétérogénéité transition primaire-collège"], terrain_example: "Utilisé pour la remise à niveau en maths." }, "ens-elev": { ia_can_do: ["Suivi individualisé", "Supports PAP/PPS"], human_only: ["Accompagnement de la préadolescence"], terrain_example: "Repérer le décrochage derrière le comportement." }, "elev-sav": { ia_can_do: ["Flashcards personnalisées", "Quiz de consolidation"], human_only: ["Apprentissage de l'organisation"], terrain_example: "Les élèves utilisent mes flashcards imprimées." } }),
        scenarios: [ { id: "hist-6e", title: "Histoire 6e Antiquité", axes_activation: { "ens-sav": 0.9, "ens-elev": 0.3, "elev-sav": 0.4 }, ia_role: "Séquence structurée", human_role: "Guide du récit historique" } ]
      },
      "college-sup": {
        vertices: buildVertices({ enseignant: { description: "Professeur-formateur. Forme à l'usage critique.", citation: "On n'interdit plus l'IA, on apprend à la maîtriser." }, eleve: { description: "Élève en formation critique. Utilise avec cadre.", citation: "L'IA répond vite. Apprendre prend du temps." }, savoir: { description: "Savoirs enrichis par la culture IA.", citation: "Savoir utiliser l'IA, c'est savoir s'en passer." } }),
        axes: buildAxes({ "ens-sav": { ia_can_do: ["Activités avec IA supervisée", "Sujets type Brevet"], human_only: ["Cadrage éthique et esprit critique"], terrain_example: "Utilisation du chatbot pour reformuler, puis explication orale." }, "ens-elev": { ia_can_do: ["Feedback instantané écrit", "Préparation Oral Brevet"], human_only: ["Éthique, plagiat et fiabilité"], terrain_example: "Dissertation trop parfaite ? Vérification à l'oral." }, "elev-sav": { ia_can_do: ["Tuteur IA encadré", "Quiz adaptatifs Brevet"], human_only: ["Compréhension profonde et transfert"], terrain_example: "L'IA pose des questions au lieu de corriger." } }),
        scenarios: [ { id: "rech-ia", title: "Recherche avec IA", axes_activation: { "ens-sav": 0.6, "ens-elev": 0.8, "elev-sav": 0.9 }, ia_role: "Assistant documentaire", human_role: "Tri critique de l'information" } ]
      },
      "lycee-sup": {
        vertices: buildVertices({ enseignant: { description: "Professeur-mentor. Guide vers l'autonomie.", citation: "L'IA génère du texte. L'enseignant éveille une pensée." }, eleve: { description: "Apprenant autonome. Crée de la pensée originale.", citation: "Le diplôme certifie ce que VOUS savez faire." }, savoir: { description: "Savoirs spécialisés et recherche.", citation: "L'IA accélère l'accès. Pas la compréhension." } }),
        axes: buildAxes({ "ens-sav": { ia_can_do: ["Projets de recherche", "Sujets type Bac"], human_only: ["Méthodologie face aux hallucinations"], terrain_example: "L'IA aide à organiser, l'élève porte son regard." }, "ens-elev": { ia_can_do: ["Simulation d'entretien", "Parcours spécialités"], human_only: ["Mentorat intellectuel et mentorat de vie"], terrain_example: "En prépa : l'IA compile, l'humain pense." }, "elev-sav": { ia_can_do: ["Tutorat scientifique 24h/24", "Synthèse de corpus documentaires"], human_only: ["Pensée critique et innovation réelle"], terrain_example: "L'intelligence se révèle sur l'inédit." } }),
        scenarios: [ { id: "oral-bac", title: "Grand Oral & IA", axes_activation: { "ens-sav": 0.5, "ens-elev": 0.7, "elev-sav": 0.9 }, ia_role: "Simulateur de jury", human_role: "Garant de l'appropriation" } ]
      }
    };

    window.ETHICS_ZONES_DATA = [
      { min: 0, max: 25, color: "#16a34a", bgColor: "#f0fdf4", label: "IA Minimale", message: "L'IA comme simple outil de forme. L'enseignant reste le seul maître à bord." },
      { min: 25, max: 60, color: "#0d9488", bgColor: "#f0fdfa", label: "IA Partenaire", badge: "ÉQUILIBRE", message: "Zone recommandée : l'IA amplifie l'expertise humaine sans la substituer." },
      { min: 60, max: 85, color: "#ea580c", bgColor: "#fff7ed", label: "IA Dominante", badge: "ATTENTION", message: "Risque de surcompensation : l'enseignant délègue ses choix fondamentaux." },
      { min: 85, max: 100, color: "#dc2626", bgColor: "#fef2f2", label: "IA Totale", badge: "ZONE ROUGE", message: "Effondrement du triangle : la relation humaine disparaît au profit du mécanique." }
    ];
  </script>

  <!-- React Framework -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // --- Onboarding ---
    const Onboarding = ({ onDismiss }) => (
      <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-xl animate-fade">
        <div className="bg-white rounded-[40px] p-12 max-w-xl shadow-2xl text-center animate-slide">
          <div className="w-24 h-24 bg-teal-50 rounded-full flex items-center justify-center mx-auto mb-8 text-4xl shadow-inner animate-float">🔺</div>
          <h2 className="font-serif italic text-4xl mb-4 text-slate-900 leading-tight">Le Triangle des Mutations</h2>
          <p className="text-slate-500 mb-10 text-lg leading-relaxed px-4">Découvrez comment l'IA redéfinit l'équilibre entre Enseignant, Élève et Savoir selon votre cycle scolaire.</p>
          <div className="grid gap-4 mb-10 text-left">
            {[
              { icon: "🌍", t: "Sélectionnez votre niveau (Primaire, Collège, Lycée)" },
              { icon: "🧩", t: "Explorez les 3 pôles et leurs nouvelles relations" },
              { icon: "🛑", t: "Testez l'éthique pour prévenir l'effondrement" }
            ].map((it, i) => (
              <div key={i} className="flex items-center gap-5 p-5 bg-slate-50 rounded-3xl border border-slate-100 group hover:bg-white hover:shadow-md transition-all">
                <span className="text-2xl">{it.icon}</span>
                <span className="text-sm font-semibold text-slate-700">{it.t}</span>
              </div>
            ))}
          </div>
          <button onClick={onDismiss} className="w-full py-6 bg-teal-600 hover:bg-teal-700 text-white rounded-[28px] font-bold text-lg transition-all shadow-xl hover:shadow-teal-200">Entrer dans le Cockpit →</button>
        </div>
      </div>
    );

    // --- Triangle SVG ---
    const TriangleSVG = ({ data, ethicsValue, activeItem, scenario, onAxisClick, onVertexClick }) => {
      const { vertices, axes } = data;
      const zone = window.ETHICS_ZONES_DATA.find(z => ethicsValue >= z.min && ethicsValue < z.max) || window.ETHICS_ZONES_DATA[3];
      const iaOpacity = 0.12 + (ethicsValue / 100) * 0.65;

      return (
        <svg viewBox="0 0 700 540" className="w-full max-w-2xl overflow-visible drop-shadow-2xl select-none">
          <defs>
            <radialGradient id="iaGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor={zone.color} stopOpacity={iaOpacity} />
              <stop offset="100%" stopColor={zone.color} stopOpacity="0" />
            </radialGradient>
            <filter id="neon"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          
          {/* IA Halo */}
          <circle cx="350" cy="300" r={80 + ethicsValue} fill="url(#iaGrad)" className="transition-all duration-700 animate-float" />

          {/* Axes */}
          {axes.map(axis => {
            const from = vertices.find(v => v.id === axis.from);
            const to = vertices.find(v => v.id === axis.to);
            const w = scenario?.axes_activation?.[axis.id] || 0.4;
            const active = activeItem?.id === axis.id;
            return (
              <g key={axis.id} className="cursor-pointer group" onClick={() => onAxisClick(axis)}>
                <line x1={from.position.x} y1={from.position.y} x2={to.position.x} y2={to.position.y} stroke="transparent" strokeWidth="45" />
                <line x1={from.position.x} y1={from.position.y} x2={to.position.x} y2={to.position.y} 
                  stroke={active ? axis.color : "#cbd5e1"} 
                  strokeWidth={active ? 3.5 : 1 + w*3} 
                  className="transition-all duration-500" 
                  style={{ filter: active ? "url(#neon)" : "none" }} />
                
                {/* Connector from IA */}
                <line x1="350" y1="300" x2={(from.position.x+to.position.x)/2} y2={(from.position.y+to.position.y)/2}
                  stroke={zone.color} strokeWidth={active ? 2.5 : 1} opacity="0.4" strokeDasharray="6,6" />
              </g>
            )
          })}

          {/* Sommets */}
          {vertices.map(v => {
            const active = activeItem?.id === v.id;
            return (
              <g key={v.id} className="cursor-pointer group transition-all" onClick={() => onVertexClick(v)}>
                <circle cx={v.position.x} cy={v.position.y} r={active ? 46 : 40} fill="white" stroke={v.color} strokeWidth={active?3:1.5} className="shadow-2xl transition-all group-hover:scale-105" />
                <text x={v.position.x} y={v.position.y - 4} textAnchor="middle" className="text-3xl select-none">{v.emoji}</text>
                <text x={v.position.x} y={v.position.y + 72} textAnchor="middle" className="font-bold text-[13px] uppercase tracking-[0.2em]" fill={v.color}>{v.label}</text>
              </g>
            )
          })}

          {/* IA Core */}
          <g transform="translate(350, 300)" className="transition-all">
            <circle r="38" fill="white" className="shadow-xl" />
            <text textAnchor="middle" dy="4" className="font-bold text-xl fill-teal-600">IA</text>
            <text textAnchor="middle" dy="24" className="text-[10px] font-black opacity-30 select-none">{ethicsValue}%</text>
          </g>
        </svg>
      )
    };

    // --- Side Drawer ---
    const DetailDrawer = ({ item, onClose }) => {
      if (!item) return null;
      const isAxis = !!item.ia_can_do;
      return (
        <div className="fixed inset-y-0 right-0 w-full max-w-xl glass z-[210] shadow-2xl animate-slide flex flex-col p-12 overflow-y-auto no-scrollbar rounded-l-[60px] border-l border-white/50">
          <button onClick={onClose} className="self-end w-14 h-14 rounded-2xl bg-white/80 flex items-center justify-center hover:bg-slate-50 transition-all text-2xl shadow-sm">✕</button>
          
          <div className="mt-10">
            <div className="text-7xl mb-8 group animate-float">{item.emoji || "⛓️"}</div>
            <h2 className="font-serif italic text-5xl text-slate-900 mb-2 leading-tight tracking-tight">{item.label}</h2>
            <p className="text-slate-400 uppercase font-black tracking-widest text-[11px] mb-10 flex items-center gap-3">
              <span className="w-10 h-[1px] bg-slate-200"></span>
              {isAxis ? "Mutation de la relation" : "Pôle d'influence stratégique"}
            </p>

            <p className="text-xl leading-relaxed text-slate-600 mb-12 font-medium">{item.description}</p>
            
            {isAxis ? (
              <div className="space-y-8 pb-12">
                <div className="p-10 rounded-[45px] bg-teal-50/50 border border-teal-100 shadow-inner">
                  <h3 className="flex items-center gap-4 font-bold text-teal-700 mb-8 uppercase tracking-widest text-xs">
                    <span className="w-2 h-2 rounded-full bg-teal-500"></span> Augmentation IA
                  </h3>
                  <div className="space-y-4">
                    {item.ia_can_do.map((v, i) => <div key={i} className="flex gap-5 text-[16px] items-start text-slate-700 leading-snug"><span className="text-teal-400 mt-1">▸</span><span>{v}</span></div>)}
                  </div>
                </div>
                <div className="p-10 rounded-[45px] bg-violet-50/50 border border-violet-100 shadow-inner">
                  <h3 className="flex items-center gap-4 font-bold text-violet-700 mb-8 uppercase tracking-widest text-xs">
                    <span className="w-2 h-2 rounded-full bg-violet-500"></span> Irremplaçable Humain
                  </h3>
                  <div className="space-y-4">
                    {item.human_only.map((v, i) => <div key={i} className="flex gap-5 text-[16px] items-start text-slate-700 leading-snug"><span className="text-violet-400 mt-1">▸</span><span>{v}</span></div>)}
                  </div>
                </div>
                <div className="p-10 rounded-[40px] bg-white border border-slate-100 shadow-sm relative overflow-hidden group">
                   <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:scale-150 transition-all">💬</div>
                   <p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-[0.3em]">Exemple de terrain</p>
                   <p className="italic text-slate-600 leading-loose text-lg font-serif">"{item.terrain_example}"</p>
                </div>
              </div>
            ) : (
              <blockquote className="p-10 border-l-[6px] border-teal-500 bg-teal-50/30 rounded-r-[30px] italic text-teal-900/60 leading-loose text-2xl font-serif">
                « {item.citation} »
              </blockquote>
            )}
          </div>
          <button onClick={onClose} className="mt-8 py-6 bg-slate-900 text-white rounded-[30px] font-bold text-lg hover:bg-black transition-all shadow-xl">Revenir à l'expérience</button>
        </div>
      )
    }

    // --- MAIN APP ---
    const App = () => {
      const [showIntro, setShowIntro] = useState(true);
      const [levelId, setLevelId] = useState('primaire');
      const [view, setView] = useState('explorer');
      const [ethicsVal, setEthicsVal] = useState(35);
      const [selectedItem, setSelectedItem] = useState(null);
      const [selectedScenario, setSelectedScenario] = useState(null);

      const levelData = window.DATA_BY_LEVEL[levelId];
      const levelMeta = window.LEVELS.find(l => l.id === levelId);
      const ethicsZone = window.ETHICS_ZONES_DATA.find(z => ethicsVal >= z.min && ethicsVal < z.max) || window.ETHICS_ZONES_DATA[3];

      return (
        <div className="min-h-screen flex flex-col pt-0 pb-12">
          {showIntro && <Onboarding onDismiss={() => setShowIntro(false)} />}
          
          <header className="px-12 py-10 bg-white shadow-sm flex items-center justify-between sticky top-0 z-[100] border-b border-slate-50">
            <div className="flex items-center gap-8 group cursor-pointer" onClick={() => setShowIntro(true)}>
               <div className="w-16 h-16 bg-slate-900 flex items-center justify-center rounded-3xl shadow-2xl text-white text-2xl group-hover:scale-110 transition-all duration-500">🔺</div>
               <div>
                  <h1 className="font-serif italic text-4xl text-slate-900 tracking-tight leading-none mb-1">Triangle <span className="text-teal-600">Premium</span></h1>
                  <p className="text-[10px] font-black uppercase text-slate-400 tracking-[0.5em] flex items-center gap-2">
                    <span className="w-8 h-[1px] bg-slate-200"></span> Cockpit Mutatif V2
                  </p>
               </div>
            </div>

            <div className="flex items-center gap-4 bg-slate-100/60 p-1.5 rounded-[22px] border border-slate-200 shadow-inner">
              {window.LEVELS.map(l => (
                <button
                  key={l.id} onClick={() => { setLevelId(l.id); setSelectedScenario(null); }}
                  className={`px-5 py-3 rounded-[18px] text-[12px] font-bold transition-all flex items-center gap-2 ${levelId === l.id ? 'bg-white shadow-xl text-slate-900 scale-105' : 'text-slate-500 hover:text-slate-800'}`}
                >
                  <span className="text-lg grayscale group-hover:grayscale-0">{l.icon}</span> {l.shortLabel}
                </button>
              ))}
            </div>

            <nav className="flex bg-slate-900 p-1.5 rounded-[22px] shadow-2xl gap-1">
              {[
                { id: 'explorer', l: 'Explorer', i: '🔍' },
                { id: 'scenarios', l: 'Situations', i: '📋' },
                { id: 'ethique', l: 'Éthique', i: '⚡' }
              ].map(t => (
                <button
                  key={t.id} onClick={() => { setView(t.id); setSelectedScenario(null); }}
                  className={`px-6 py-3 rounded-[18px] text-[11px] font-black uppercase tracking-widest transition-all flex items-center gap-3 ${view === t.id ? 'bg-white/10 text-teal-400' : 'text-slate-400 hover:text-white'}`}
                >
                  <span className="text-lg">{t.i}</span> {t.l}
                </button>
              ))}
            </nav>
          </header>

          <main className="flex-1 max-w-[1536px] mx-auto w-full flex flex-col lg:flex-row px-12 py-16 gap-24">
            
            {/* Colonne Gauche: Visualization */}
            <div className="flex-[1.3] flex flex-col items-center justify-center relative animate-fade">
               
               <div className="w-full max-w-4xl mb-12 animate-fade">
                  <div className="bg-teal-50/60 border border-teal-100 rounded-[35px] p-6 flex items-center gap-6 shadow-sm">
                    <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm text-xl shrink-0">🏛️</div>
                    <p className="text-[13px] text-teal-800/80 leading-relaxed font-semibold">
                      <strong className="text-teal-900 uppercase text-[10px] tracking-widest block mb-1">Cadre Officiel — MEN 2025</strong>
                      {levelMeta.regulation}
                    </p>
                  </div>
               </div>

               <TriangleSVG 
                 data={levelData}
                 ethicsValue={view === 'ethique' ? ethicsVal : 35} 
                 activeItem={selectedItem} 
                 scenario={selectedScenario}
                 onAxisClick={setSelectedItem} 
                 onVertexClick={setSelectedItem} />

               {/* Guide Contextuel Pilule */}
               <div className="mt-16 bg-white/90 glass shadow-hologram px-12 py-6 rounded-[35px] flex items-center gap-6 border border-white/50 animate-float">
                  <div className="w-3 h-3 rounded-full bg-teal-500 shadow-[0_0_15px_rgba(20,184,166,0.6)] animate-pulse"></div>
                  <p className="text-[12px] font-black text-slate-500 uppercase tracking-[0.3em]">
                    {view === 'explorer' && "Explorez un pôle ou une relation"}
                    {view === 'scenarios' && (selectedScenario ? `MODE : ${selectedScenario.title}` : "Choisissez un scénario pratique")}
                    {view === 'ethique' && `ÉQUILIBRE : ${ethicsZone.label}`}
                  </p>
               </div>
            </div>

            {/* Colonne Droite: Context & Controls */}
            <div className="flex-1 flex flex-col space-y-12">
               
               <div className="animate-slide">
                  <h2 className="font-serif italic text-6xl text-slate-900 mb-8 leading-[1.1] tracking-tighter">
                    {view === 'explorer' && `Anatomie du cycle ${levelMeta.shortLabel}`}
                    {view === 'scenarios' && "L'IA en situation réelle"}
                    {view === 'ethique' && "Ajuster la tension mutative"}
                  </h2>
                  <p className="text-slate-500 leading-relaxed text-xl max-w-xl font-medium">
                    {view === 'explorer' && "Cliquez sur les éléments du triangle pour comprendre comment l'IA module chaque interaction pédagogique pour ce niveau scolaire."}
                    {view === 'scenarios' && "Découvrez des cas concrets où l'IA assiste l'enseignant tout en laissant la place à l'intervention humaine stratégique."}
                    {view === 'ethique' && "L'augmentation a un coût. Modifiez le curseur pour observer comment la structure résiste ou s'effondre sous l'automatisation."}
                  </p>
               </div>

               <div className="flex-1 space-y-6">
                 {view === 'explorer' && (
                   <div className="grid gap-4 animate-slide">
                     {levelData.vertices.map(v => (
                       <button key={v.id} onClick={() => setSelectedItem(v)} className="p-8 bg-white border border-slate-100 rounded-[40px] flex justify-between items-center group hover:shadow-2xl hover:scale-[1.02] transition-all">
                          <div className="flex items-center gap-6">
                            <span className="text-4xl filter grayscale group-hover:grayscale-0 transition-all duration-500">{v.emoji}</span>
                            <span className="font-bold text-slate-800 text-xl font-serif italic tracking-tight">{v.label}</span>
                          </div>
                          <div className="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                             <span className="text-teal-600 font-black">→</span>
                          </div>
                       </button>
                     ))}
                   </div>
                 )}

                 {view === 'scenarios' && (
                   <div className="grid gap-5 animate-slide">
                     {levelData.scenarios.map(s => (
                       <button key={s.id} onClick={() => setSelectedScenario(s)} className={`p-10 text-left rounded-[45px] border-2 transition-all duration-500 relative overflow-hidden ${selectedScenario?.id === s.id ? 'bg-slate-900 text-white border-transparent shadow-2xl scale-[1.03]' : 'bg-white border-slate-100 hover:border-teal-200'}`}>
                          {selectedScenario?.id === s.id && <div className="absolute top-0 right-0 w-32 h-32 bg-teal-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>}
                          <div className="flex justify-between items-start mb-6">
                             <div className="w-14 h-14 bg-teal-50 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🎯</div>
                             <span className={`text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-full ${selectedScenario?.id === s.id ? 'bg-white/10 text-teal-400' : 'bg-slate-50 text-slate-400'}`}>Actif</span>
                          </div>
                          <h4 className="text-2xl font-bold mb-4 font-serif italic">{s.title}</h4>
                          <div className={`text-sm leading-relaxed ${selectedScenario?.id === s.id ? 'text-slate-300' : 'text-slate-500'}`}>
                             <div className="mb-3"><strong>🤖 Rôle IA :</strong> {s.ia_role}</div>
                             <div><strong>💚 Valeur Humaine :</strong> {s.human_role}</div>
                          </div>
                       </button>
                     ))}
                   </div>
                 )}

                 {view === 'ethique' && (
                   <div className="space-y-12 animate-slide">
                     <div className="bg-white p-12 rounded-[50px] shadow-sm border border-slate-50">
                        <div className="flex justify-between items-center mb-10">
                           <span className="text-5xl font-serif italic text-teal-600 font-bold">{ethicsVal}%</span>
                           <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] animate-pulse">Mutation Structurelle</span>
                        </div>
                        <input 
                           type="range" min="0" max="100" value={ethicsVal} 
                           onChange={e => setEthicsVal(parseInt(e.target.value))}
                           className="w-full mb-12" />
                        
                        <div className="p-12 rounded-[40px] transition-all duration-700 space-y-6" style={{ background: ethicsZone.bgColor }}>
                           <div className="flex justify-between items-center">
                              <h3 className="font-black uppercase tracking-widest text-[11px]" style={{ color: ethicsZone.color }}>{ethicsZone.label}</h3>
                              {ethicsZone.badge && <span className="px-6 py-2 bg-white/80 rounded-full text-[10px] font-black shadow-sm" style={{ color: ethicsZone.color }}>{ethicsZone.badge}</span>}
                           </div>
                           <p className="text-2xl font-serif italic leading-snug" style={{ color: ethicsZone.color }}>{ethicsZone.message}</p>
                        </div>
                     </div>
                   </div>
                 )}
               </div>
            </div>
          </main>

          <footer className="px-20 py-16 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-12 bg-white/60 backdrop-blur-md">
             <div className="text-slate-400 text-[13px] max-w-xl text-center md:text-left leading-loose font-medium">
               Modèle pédagogique de <strong>Jean Houssaye (1988)</strong>, mis à jour pour l'ère des IA génératives par <strong>Vanessa Le Scolan (2025)</strong>. Une réflexion sur la place de l'humain dans les structures mutatives.
             </div>
             <div className="flex items-center gap-12">
               <a href="https://maprofbranchee.fr" className="text-xs font-black text-teal-600 px-10 py-5 bg-teal-50/50 rounded-3xl border border-teal-100/50 hover:bg-teal-100 transition-all">© MaProfBranchée</a>
             </div>
          </footer>

          {selectedItem && <DetailDrawer item={selectedItem} onClose={() => setSelectedItem(null)} />}
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
